# Configuração para produção (H2 Database persistente)
spring.datasource.url=jdbc:h2:file:./data/tjsp_audiencias_prod;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=prodpassword
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 habilitado também em produção para acesso aos dados
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Configurações de produção
spring.jpa.show-sql=false

# Pool de conexões otimizado para produção
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

# Configurações de segurança para produção
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Logs otimizados para produção
logging.level.br.jus.tjsp.audiencias=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN

# Actuator para health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true