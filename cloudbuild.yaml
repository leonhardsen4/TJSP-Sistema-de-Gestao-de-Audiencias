# Configuração do Google Cloud Build
steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/tjsp-audiencias:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/tjsp-audiencias:latest',
      '.'
    ]

  # Push da imagem para Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tjsp-audiencias:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tjsp-audiencias:latest']

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'tjsp-audiencias',
      '--image', 'gcr.io/$PROJECT_ID/tjsp-audiencias:$COMMIT_SHA',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '1Gi',
      '--cpu', '1',
      '--max-instances', '10',
      '--set-env-vars', 'SPRING_PROFILES_ACTIVE=prod',
      '--set-cloudsql-instances', '$PROJECT_ID:us-central1:tjsp-audiencias-db'
    ]

# Configurações adicionais
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout do build
timeout: '1200s'