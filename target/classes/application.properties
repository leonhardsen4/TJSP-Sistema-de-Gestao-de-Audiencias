# Perfil ativo (dev para desenvolvimento local, prod para produção)
spring.profiles.active=dev

# Configurações comuns
# Pool de conexões
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Configuração JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Configuração de mensagens
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Configuração do servidor
server.port=8080
server.address=0.0.0.0

# Configuração Jackson para JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# Configuração de logging
logging.level.br.jus.tjsp.audiencias.service.PautaService=INFO
logging.level.br.jus.tjsp.audiencias.controller.PautaController=INFO
logging.level.root=INFO

# Configuração de Email (usar variáveis de ambiente em produção)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sistema@tjsp.jus.br}
spring.mail.password=${MAIL_PASSWORD:senha_do_email}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true