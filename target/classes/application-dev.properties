# Configuração para desenvolvimento local (H2 Database)
spring.datasource.url=jdbc:h2:file:./data/tjsp_audiencias;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar console H2 para desenvolvimento
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logs mais detalhados para desenvolvimento
spring.jpa.show-sql=true
logging.level.br.jus.tjsp.audiencias.service.PautaService=DEBUG
logging.level.br.jus.tjsp.audiencias.controller.PautaController=DEBUG